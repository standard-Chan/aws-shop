spring:
  application:
    name: my-app

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: dev   # ?? ?? ??
  # 가상 스레드 설정
  threads:
    virtual:
      enabled: true


  datasource:
    hikari:
      maximum-pool-size: 30  # 최대 커넥션 풀 크기

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
