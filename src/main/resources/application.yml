spring:
  application:
    name: my-app

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: dev   # ?? ?? ??
  # 가상 스레드 설정
  threads:
    virtual:
      enabled: true


  datasource:
    hikari:
      maximum-pool-size: 30  # 최대 커넥션 풀 크기

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: earliest
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: jeong.awsshop.analytics.domain.AnalyticsEventMessage
        spring.json.trusted.packages: jeong.awsshop.analytics.domain
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
  product-search:
    elasticsearch:
      enabled: ${PRODUCT_SEARCH_ES_ENABLED:true}
      uris: ${PRODUCT_SEARCH_ES_URIS:http://localhost:19200}
      index-name: ${PRODUCT_SEARCH_ES_INDEX:products-search}
  analytics:
    kafka:
      enabled: ${ANALYTICS_KAFKA_ENABLED:false}
      topics:
        search: ${ANALYTICS_TOPIC_SEARCH:search-events}
        product-view: ${ANALYTICS_TOPIC_PRODUCT_VIEW:product-view-events}
        cart: ${ANALYTICS_TOPIC_CART:cart-events}
        purchase: ${ANALYTICS_TOPIC_PURCHASE:purchase-events}
      consumer:
        group-id: ${ANALYTICS_CONSUMER_GROUP_ID:analytics-event-consumer-group}
