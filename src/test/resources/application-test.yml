spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  kafka:
    listener:
      auto-startup: false

app:
  product:
    detail-cache:
      enabled: false
      ttl: 1h
      async:
        core-pool-size: 2
        max-pool-size: 8
        queue-capacity: 1000
  analytics:
    kafka:
      enabled: false

logging:
  level:
    root: warn

external-api:
  order-server:
    base-url: http://localhost:8080
