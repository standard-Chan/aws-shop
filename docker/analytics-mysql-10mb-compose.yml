services:
  analytics-mysql:
    image: mysql:8.4
    container_name: aws-shop-analytics-mysql-10mb
    ports:
      - "${ANALYTICS_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${ANALYTICS_MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: aws_shop_test
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-flush-log-at-trx-commit=1
      - --sync-binlog=1
    volumes:
      - analytics-mysql-10mb-data:/var/lib/mysql
    blkio_config:
      device_write_bps:
        - path: ${DB_WRITE_LIMIT_DEVICE:-/dev/sdb}
          rate: ${DB_WRITE_LIMIT_BPS:-10mb}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"
        ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  analytics-mysql-10mb-data:
