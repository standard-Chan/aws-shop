spring:
  application:
    name: event-product-ranking
  config:
    import:
      - optional:file:event-pipeline/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  data:
    redis:
      host: ${EVENT_PRODUCT_RANKING_REDIS_HOST:localhost}
      port: ${EVENT_PRODUCT_RANKING_REDIS_PORT:16379}

server:
  port: ${EVENT_PRODUCT_RANKING_PORT:18083}

event-pipeline:
  product-ranking:
    batch:
      size: ${EVENT_PRODUCT_RANKING_BATCH_SIZE:1000}
      flush-interval-millis: ${EVENT_PRODUCT_RANKING_BATCH_FLUSH_INTERVAL_MILLIS:1000}
      queue-capacity: ${EVENT_PRODUCT_RANKING_BATCH_QUEUE_CAPACITY:100000}
    redis-latency:
      sample-capacity: ${EVENT_PRODUCT_RANKING_REDIS_LATENCY_SAMPLE_CAPACITY:1000000}
    cache:
      refresh-interval-millis: ${EVENT_PRODUCT_RANKING_CACHE_REFRESH_INTERVAL_MILLIS:1000}
    clickhouse:
      enabled: ${EVENT_PRODUCT_RANKING_CLICKHOUSE_ENABLED:false}
      url: ${EVENT_PRODUCT_RANKING_CLICKHOUSE_URL:jdbc:clickhouse://localhost:18123/default}
      username: ${EVENT_PRODUCT_RANKING_CLICKHOUSE_USERNAME:default}
      password: ${EVENT_PRODUCT_RANKING_CLICKHOUSE_PASSWORD:}
      initialize-schema: ${EVENT_PRODUCT_RANKING_CLICKHOUSE_INITIALIZE_SCHEMA:true}
