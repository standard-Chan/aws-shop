worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    multi_accept on;
    use epoll;
}

http {
    access_log off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    keepalive_requests 10000;

    upstream product_ranking {
        least_conn;
        server product-ranking-1:18083 max_fails=3 fail_timeout=10s;
        server product-ranking-2:18083 max_fails=3 fail_timeout=10s;
        keepalive 1024;
    }

    server {
        listen 80 backlog=8192 reuseport;
        server_name _;

        error_log /var/log/nginx/error.log warn;

        location / {
            proxy_pass http://product_ranking;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 3s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;

            add_header X-Upstream-Addr $upstream_addr always;
        }
    }
}
