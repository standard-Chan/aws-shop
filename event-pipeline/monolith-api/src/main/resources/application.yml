spring:
  application:
    name: event-monolith-api
  config:
    import:
      - optional:file:event-pipeline/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]

server:
  port: ${EVENT_MONOLITH_PORT:18081}

event-pipeline:
  monolith:
    node-id: ${EVENT_MONOLITH_NODE_ID:1}
    batch:
      size: ${EVENT_MONOLITH_BATCH_SIZE:10000}
      flush-interval-millis: ${EVENT_MONOLITH_BATCH_FLUSH_INTERVAL_MILLIS:1000}
    hadoop:
      output-path: ${EVENT_MONOLITH_HADOOP_OUTPUT_PATH:/tmp/aws-shop-event-pipeline/monolith-user-behavior-events.jsonl}
    elasticsearch:
      enabled: ${EVENT_MONOLITH_ES_ENABLED:true}
      base-url: ${EVENT_MONOLITH_ES_BASE_URL:http://localhost:19200}
      index-name: ${EVENT_MONOLITH_ES_INDEX_NAME:user-behavior-events}
