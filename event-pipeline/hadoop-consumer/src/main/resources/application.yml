spring:
  # 애플리케이션 이름
  application:
    name: event-hadoop-consumer
  # 환경변수 파일 import 경로
  config:
    import:
      - optional:file:event-pipeline/.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:.env[.properties]
  # 비웹 애플리케이션 실행 모드
  main:
    web-application-type: none
  # Kafka Consumer 설정
  kafka:
    # Kafka bootstrap server 목록
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092,localhost:19093,localhost:19094}
    consumer:
      # Kafka record key 역직렬화 방식
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # Kafka record value 에러 처리 역직렬화 방식
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      # 초기 offset reset 정책
      auto-offset-reset: earliest
      properties:
        # JSON 역직렬화 delegate
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        # 기본 메시지 payload 타입
        spring.json.value.default.type: jeong.awsshop.eventpipeline.common.UserBehaviorEventMessage
        # JSON 역직렬화 허용 패키지
        spring.json.trusted.packages: jeong.awsshop.eventpipeline.common

event-pipeline:
  # 사용자 행동 이벤트 타입별 Kafka topic 이름
  topics:
    search: ${EVENT_TOPIC_SEARCH:search-events}
    product-view: ${EVENT_TOPIC_PRODUCT_VIEW:product-view-events}
    cart: ${EVENT_TOPIC_CART:cart-events}
    purchase: ${EVENT_TOPIC_PURCHASE:purchase-events}
  # Hadoop 적재용 Consumer group
  consumer:
    group-id: ${EVENT_HADOOP_CONSUMER_GROUP_ID:analytics-hadoop-consumer-group}
  # Hadoop 적재 staging 설정
  hadoop:
    # JSONL staging 파일 경로
    output-path: ${EVENT_HADOOP_OUTPUT_PATH:/tmp/aws-shop-event-pipeline/user-behavior-events.jsonl}
